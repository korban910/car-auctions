name: Build and publish

on:
  workflow_dispatch:
  # Below is comment out for GITHUB action
  # When digital ocean is set up use it
  # push:
  #  branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      continue: "false"
    strategy:
      matrix:
        service:
          - name: "korban910/auction-svc"
            path: "src/AuctionService"
          - name: "korban910/bid-svc"
            path: "src/BiddingService"
          - name: "korban910/search-svc"
            path: "src/SearchService"
          - name: "korban910/notify-svc"
            path: "src/NotificationService"
          - name: "korban910/identity-svc"
            path: "src/IdentityService"
          - name: "korban910/gateway-svc"
            path: "src/GatewayService"
          - name: "korban910/web-app"
            path: "frontend/web-app"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in serivce path
        run: |
          if git diff --quiet HEAD^ HEAD -- ${{matrix.service.path}}; then
            echo "No changes in ${{matrix.service.path}}. Skipping build"
            echo "continue=false" >> $GITHUB_ENV
          else
            echo "Changes detected in ${{matrix.service.path}}. Proceeding with build"
            echo "continue=true" >> $GITHUB_ENV
          fi

      - name: Set up Docker buildx
        if: env.continue == 'true'
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker
        if: env.continue == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}

      - name: Build and push docker image
        if: env.continue == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{matrix.service.path}}/Dockerfile
          push: true
          tags: ${{matrix.service.name}}:latest

  apply-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{secrets.DIGITALOCEAN_TOKEN}} # Add the token to GitHub Secrets Manually, follow GITHUBACTION.md for set up

      - name: Save DigitalOcean Kubeconfig
        run: doctl kubernetes cluster kubeconfig save car-auctions

      - name: Apply the ingress-nginx controller
        run: kubectl apply -f infra/ingress/ingress-do-depl.yml

      - name: Wait for ingress-nginx to be ready
        run: |
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      - name: Write the .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Apply the K8S deployment
        run: |
          set -a; . ./.env; set +a
          for f in infra/K8S/*.yml infra/prod-k8s/*.yml; do
            envsubst < "$f" | kubectl apply -f -
          done
