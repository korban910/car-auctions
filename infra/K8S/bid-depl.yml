apiVersion: apps/v1
kind: Deployment
metadata:
  name: bid-svc
spec:
  selector:
    matchLabels:
      app: bid-svc
  template:
    metadata:
      labels:
        app: bid-svc
    spec:
      containers:
        - name: bid-svc
          image: korban910/bid-svc
          imagePullPolicy: IfNotPresent
          env:
            - name: BIDDING_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bid-secret
                  key: connString
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: password
          envFrom:
            - configMapRef:
                name: bid-svc-config
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bid-clusterip
spec:
  selector:
    app: bid-svc
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
  