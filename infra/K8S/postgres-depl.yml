apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres
        env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: password
        ports:
        - containerPort: 5432
        volumeMounts:
          - mountPath: /var/lib/postgresql # If does not work for digital ocean, change to /var/data/postgres
            name: postgresdata
      volumes:
        - name: postgresdata
          persistentVolumeClaim:
            claimName: postgres-claim
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-clusterip
spec:
  selector:
    app: postgres # CONTAINER NAME
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP 
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-np
spec:
  selector:
    app: postgres # CONTAINER NAME
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      nodePort: 30001
  type: NodePort # LoadBalancer