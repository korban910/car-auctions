apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
spec:
  selector:
    matchLabels:
      app: identity-svc
  template:
    metadata:
      labels:
        app: identity-svc
    spec:
      containers:
        - name: identity-svc
          image: korban910/identity-svc:latest
          env:
            - name: IDENTITY_DATABASE
              valueFrom:
                secretKeyRef:
                  name: identity-secret
                  key: connString
          envFrom:
            - configMapRef:
                name: identity-svc-config
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: identity-clusterip
spec:
  selector:
    app: identity-svc
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
