apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-svc
spec:
  selector:
    matchLabels:
      app: search-svc
  template:
    metadata:
      labels:
        app: search-svc
    spec:
      containers:
        - name: search-svc
          image: korban910/search-svc
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: search-svc-config
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: search-clusterip
spec:
  selector:
    app: search-svc
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
  