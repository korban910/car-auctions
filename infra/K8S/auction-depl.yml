apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-svc
spec:
  selector:
    matchLabels:
      app: auction-svc
  template:
    metadata:
      labels:
        app: auction-svc
    spec:
      containers:
        - name: auction-svc
          image: korban910/auction-svc
          imagePullPolicy: IfNotPresent
          env:
            - name: AUCTION_DATABASE
              valueFrom:
                secretKeyRef:
                  name: auction-secret
                  key: connString
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: password
          envFrom:
            - configMapRef:
                name: auction-svc-config
          ports:
          - containerPort: 80
            name: web
          - containerPort: 7777
            name: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: auction-clusterip
spec:
  selector:
    app: auction-svc
  ports:
  - port: 80
    targetPort: 80
    name: web
  - port: 7777
    targetPort: 7777
    name: grpc
  type: ClusterIP
  